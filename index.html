<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>MODAL POPUP</title>
</head>
<body>
    <div class="container">
        <button id="openModalBtn" class="open-modal" type="submit" onclick="openPopup()">Open Popup</button>

        <div id="myModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <img src="404-tick.png" alt="Success" height="50px" width="auto">
                <h2>Modal Popup</h2>
                <p>This is a simple modal popup example.</p>
                <button type="button" onclick="closePopup()">Close</button>
            </div>
        </div>

        <footer class="footer">
           <p>&copy; 2026 Fortune U. Emmanuel. All rights reserved.</p>
       </footer>
    </div>
    

    <script defer src="app.js"></script>
</body>
</html>
